services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: nelson
      POSTGRES_PASSWORD: nelson
      POSTGRES_DB: nelson
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nelson"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://nelson:nelson@db:5432/nelson
      JWT_SECRET: local-dev-secret
      FERNET_KEY: local-dev-fernet-key
      CORS_ORIGINS: '["http://localhost:3000"]'
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      EMAIL_PROVIDER: smtp
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025/api/v1/info"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
